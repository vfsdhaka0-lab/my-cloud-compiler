name: build
on:
  workflow_dispatch:
jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Java Setup
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Flutter Setup
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Debug Info
        run: |
          echo "Listing root files:"
          ls -R
      - name: Build
        run: |
          flutter pub get
          flutter build apk --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "**/*.apk"

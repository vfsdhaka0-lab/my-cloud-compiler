name: build
on:
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: 2. Setup Flutter & Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 3. Infrastructure Setup
        run: |
          # Create a temp folder to hold your custom code safely
          mkdir -p temp_code
          cp lib/main.dart temp_code/main.dart
          cp pubspec.yaml temp_code/pubspec.yaml

          # WIPE and Recreate fresh project structure
          rm -rf android lib pubspec.yaml
          flutter create . --org com.royal --project-name my_cloud_compiler --platforms android --overwrite
          
          # OVERWRITE the default counter app with YOUR custom code
          cp temp_code/main.dart lib/main.dart
          cp temp_code/pubspec.yaml pubspec.yaml
          
          flutter pub get

      - name: 4. Build
        run: flutter build apk --release

      - name: 5. Upload
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "build/app/outputs/flutter-apk/*.apk"

name: build
on:
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 4. Clean and Repair Project
        # This step fixes the "Task not found" and "flutterRoot" errors
        run: |
          # Remove any existing broken android files
          rm -rf android .gitignore pubspec.lock
          
          # Recreate the android project structure perfectly
          # --org sets your package name (com.royal)
          flutter create . --org com.royal --platforms android --overwrite
          
          # Get dependencies
          flutter pub get

      - name: 5. Build Release APK
        # Added --verbose to help us see exactly what happens if it fails
        run: flutter build apk --release --verbose

      - name: 6. Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "build/app/outputs/flutter-apk/*.apk"
          if-no-files-found: error

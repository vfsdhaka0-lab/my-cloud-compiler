name: build
on:
  workflow_dispatch:
jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: CLEAN_REPAIR_BUILD
        run: |
          # 1. Clean up any existing broken files
          rm -rf android .gitignore pubspec.yaml
          
          # 2. Recreate the project perfectly with YOUR package name
          # Change "com.royal.event" below if you want a different default
          flutter create . --org com.royal --project-name my_cloud_compiler --platforms android --overwrite
          
          # 3. Pull your custom code (main.dart) into the fresh project
          # Note: The 'checkout' step already pulled your latest 'lib/main.dart'
          
          flutter pub get
          flutter build apk --release
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "build/app/outputs/flutter-apk/*.apk"

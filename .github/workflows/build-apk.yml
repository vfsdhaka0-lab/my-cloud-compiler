name: build
on:
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Inject & Build
        run: |
          # 1. Protect original assets
          mkdir -p backup
          cp lib/main.dart backup/
          cp pubspec.yaml backup/
          [ -f assets/icon.png ] && cp assets/icon.png backup/ || echo "No icon"
          
          # 2. Re-initialize project to fix environment issues
          rm -rf android lib pubspec.yaml
          flutter create . --org com.royal --project-name my_cloud_compiler --platforms android --overwrite
          
          # 3. Restore your code
          cp backup/main.dart lib/main.dart
          cp backup/pubspec.yaml pubspec.yaml
          
          # 4. Handle Custom App Icon if exists
          if [ -f backup/icon.png ]; then
            mkdir -p assets
            cp backup/icon.png assets/icon.png
            flutter pub add --dev flutter_launcher_icons
            echo "flutter_launcher_icons:" > flutter_launcher_icons.yaml
            echo "  android: true" >> flutter_launcher_icons.yaml
            echo "  image_path: \"assets/icon.png\"" >> flutter_launcher_icons.yaml
            dart run flutter_launcher_icons
          fi
          
          # 5. Fetch dependencies
          flutter pub get
          
          # 6. Build APK with dynamic versioning
          # Using github.run_number ensures every build is an "Update" to the previous one
          flutter build apk --release --build-name=1.0.0 --build-number=${{ github.run_number }}

      - name: Upload Direct APK
        uses: actions/upload-artifact@v7
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          # 2026 Feature: Prevents zipping so the app can install the file directly
          archive: false 
          retention-days: 1
